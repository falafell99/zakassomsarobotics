name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile \
            main.py \
            detector.py \
            image_utils.py \
            navigator.py \
            schemas.py \
            speaker.py \
            webcam_debug.py \
            scripts/autolabel_officedata.py \
            scripts/collect_frames.py \
            scripts/export_model.py \
            scripts/speak_output.py \
            scripts/train_home_office.py

  firmware:
    name: PlatformIO firmware build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - freenove_esp32_s3_wroom
          - seeed_xiao_esp32s3_sense

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Wi-Fi config stub
        run: |
          cp firmware/platformio_esp32_camera_client/src/wifi_config.example.h \
             firmware/platformio_esp32_camera_client/src/wifi_config.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          platformio run \
            --project-dir firmware/platformio_esp32_camera_client \
            --environment ${{ matrix.env }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: |
            firmware/platformio_esp32_camera_client/.pio/build/${{ matrix.env }}/firmware.bin
            firmware/platformio_esp32_camera_client/.pio/build/${{ matrix.env }}/firmware.elf
          if-no-files-found: error
